<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>The Georgian Network — St George's College</title>
<meta name="description" content="The Georgian Network — St George's College Staff Intranet"/>
<link rel="icon" type="image/png" href="assets/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Asap:wght@300;400;500;600;700&family=Asap+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="styles.css" rel="stylesheet"/>
<link href="marketing.css" rel="stylesheet"/>
<link href="admin.css" rel="stylesheet"/>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-brand" id="hdr-brand">
    <img class="hdr-logo" id="hdr-logo" src="assets/logo-h.png" alt="St George's College"/>
    <div class="hdr-divider"></div>
    <div class="hdr-net">
      <span class="hdr-net-name">The Georgian Network</span>
      <span class="hdr-net-sub" id="net-sub">Staff Intranet</span>
    </div>
  </div>
  <div class="hdr-mid">
    <button class="btn-icon" id="btn-sb-toggle" aria-label="Menu"></button>
    <label class="hdr-search">
      <span id="search-ico"></span>
      <input id="search-input" type="text" placeholder="Search on Google…" aria-label="Search"/>
    </label>
  </div>
  <div class="hdr-right">
    <span class="hdr-badge"><span class="hdr-dot"></span><span id="live-badge">Live</span></span>
    <button class="hdr-admin" id="btn-admin" aria-label="Back office" title="Back office"></button>
    <div class="lang-group" role="group" aria-label="Language">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
  </div>
</header>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sb-nav" id="sb-nav"></div>
  <div class="sb-bottom">
    <div class="sb-switches">
      <div class="sb-switch-row" id="theme-switch">
        <span class="sb-switch-name" id="theme-name">Theme</span>
        <span class="sb-switch-lbl sw-sun sw-active" id="sw-sun">☀</span>
        <span class="sb-switch-track" id="theme-track"><span class="sb-switch-thumb"></span></span>
        <span class="sb-switch-lbl" id="sw-moon">☾</span>
      </div>
      <div class="sb-switch-row sb-embed-lang" id="sb-embed-lang">
        <span class="sb-switch-name">Language</span>
        <div class="lang-group" role="group" aria-label="Language">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="es">ES</button>
        </div>
      </div>
    </div>
    <button class="sb-embed-admin-btn" id="btn-admin-sb" title="Back office"></button>
    <div class="sb-update" id="sb-update"><span class="sb-live-dot"></span>Network updated · Oct 2025</div>
  </div>
</nav>

<div class="scrim" id="scrim"></div>

<!-- CONTENT -->
<main class="content" id="content">
  <section class="panel active" id="panel"></section>
  <footer>
    <img class="foot-logo" id="foot-logo" src="assets/logo-h.png" alt="St George's College"/>
    <div class="foot-txt">The Georgian Network · St George's College<br/>Vestigia Nulla Retrorsum</div>
    <div class="foot-social" id="foot-social"></div>
  </footer>
</main>

<!-- NEWS MODAL -->
<div class="modal-overlay" id="modal-overlay"></div>

<style>
.scrim{position:fixed;inset:0;background:rgba(20,18,15,.4);z-index:150;opacity:0;pointer-events:none;transition:opacity .25s;}
.scrim.show{opacity:1;pointer-events:auto;}
@media(min-width:861px){.scrim{display:none;}}
.news-media.no-img{background:linear-gradient(135deg,#243a6e,#172548);position:relative;display:flex;align-items:center;justify-content:center;}
.news-media.no-img::after{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(220,30,51,.18));}
</style>

<script src="store.js"></script>
<script src="data.js"></script>
<script src="sync.js"></script>
<script src="marketing.js"></script>
<script src="app.js"></script>
<script src="admin.js"></script>
<script>
/* inject header/footer icons that app.js owns after load */
(function(){
  function set(){
    var s=document.getElementById('search-ico');
    if(s)s.innerHTML='<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>';
    var m=document.getElementById('btn-sb-toggle');
    if(m)m.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>';
    var ICONS={globe:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.7 2.5 15.3 0 18M12 3c-2.5 2.7-2.5 15.3 0 18"/></svg>',facebook:'<svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor"><path d="M14 9V7c0-1 .3-1.5 1.6-1.5H17V2.5h-2.6C11.6 2.5 10.5 4 10.5 6.4V9H8v3h2.5v9.5H14V12h2.4l.4-3z"/></svg>',instagram:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>',linkedin:'<svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor"><path d="M6.5 8.5v10h-3v-10zM5 3.5A1.75 1.75 0 1 1 5 7a1.75 1.75 0 0 1 0-3.5zM9 8.5h2.9v1.4h.04c.4-.76 1.4-1.6 2.9-1.6 3.1 0 3.66 2 3.66 4.7v5.5h-3v-4.9c0-1.16-.02-2.66-1.62-2.66-1.62 0-1.87 1.27-1.87 2.58v4.98H9z"/></svg>',youtube:'<svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor"><path d="M22 8.2a3 3 0 0 0-2.1-2.1C18 5.5 12 5.5 12 5.5s-6 0-7.9.6A3 3 0 0 0 2 8.2 31 31 0 0 0 1.6 12 31 31 0 0 0 2 15.8a3 3 0 0 0 2.1 2.1c1.9.6 7.9.6 7.9.6s6 0 7.9-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 22.4 12 31 31 0 0 0 22 8.2zM10 15V9l5.2 3z"/></svg>'};
    var fs=document.getElementById('foot-social');
    if(fs&&window.TGN){fs.innerHTML=window.TGN.SOCIAL.map(function(s){return '<a class="foot-soc" href="'+s.url+'" target="_blank" rel="noopener" aria-label="'+s.name+'">'+(ICONS[s.icon]||'')+'</a>';}).join('');}
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',set);else set();
})();
</script>
</body>
</html>
